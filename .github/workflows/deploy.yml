name: Deploy to Production

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/clickprops

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Hetzner VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_IP }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e

            cd /opt/clickprops

            # Pull latest compose files
            git pull origin main

            # Login to registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest image
            export IMAGE_TAG=${{ github.sha }}
            export DOCKER_REGISTRY=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            docker compose -f docker-compose.prod.yml pull

            # Run database migrations before restarting app
            docker compose -f docker-compose.prod.yml exec -T app npx prisma migrate deploy

            # Zero-downtime deploy: start updated app and workers
            docker compose -f docker-compose.prod.yml up -d --no-deps --wait app worker

            # Health check
            for i in $(seq 1 10); do
              if curl -sf http://localhost:3000/api/health > /dev/null; then
                echo "Health check passed"
                break
              fi
              if [ $i -eq 10 ]; then
                echo "Health check failed - rolling back"
                docker compose -f docker-compose.prod.yml logs app
                exit 1
              fi
              sleep 5
            done

            # Clean up old images
            docker image prune -f

            # Restart monitoring services
            if [ -f "docker-compose.monitoring.yml" ]; then
              docker compose -f docker-compose.monitoring.yml pull
              docker compose -f docker-compose.monitoring.yml up -d
            fi

      - name: Notify on success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "ClickProps deployed to production successfully! Commit: ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "ClickProps production deployment FAILED! Commit: ${{ github.sha }}. Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
